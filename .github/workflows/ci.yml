# CI: format, lint, and test on every push/PR to the long-lived
# branches (Git flow: develop = integration, main = releases).
#
# yomu-shell is excluded from the cargo jobs: it needs the Linux webview
# stack and a baked-in web dist, both of which the `packages` job covers
# through `nix build .#yomu-desktop`.
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      # Persist the Nix store across runs: without this every job
      # re-downloads the whole dev-shell closure from cache.nixos.org —
      # several minutes before any step runs.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-check-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-check-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-check-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Persist cargo deps + build artifacts so clippy/test only
      # recompile the crates that actually changed.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'flake.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo fmt
        run: nix develop -c cargo fmt --check

      - name: cargo clippy
        run: |
          nix develop -c cargo clippy --workspace --exclude yomu-shell \
            --all-targets -- -D warnings

      - name: cargo clippy (wasm)
        # The UI actually ships as wasm; lint it for its real target.
        run: |
          nix develop -c cargo clippy -p yomu-ui -p yomu-web \
            --target wasm32-unknown-unknown -- -D warnings

      - name: cargo nextest
        run: nix develop -c cargo nextest run --workspace --exclude yomu-shell

  # Everything a release ships must build from the flake, including the
  # desktop shell (the one workspace member the cargo jobs skip).
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      # Same store-persistence as the check job, separate key: this
      # job's closure is the package build inputs, not the dev shell.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-build-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-build-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-build-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: nix build
        run: nix build .#yomu-server .#yomu-web .#yomu-desktop
