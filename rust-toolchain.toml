[toolchain]
channel = "stable"
components = ["rustfmt", "clippy", "rust-src", "rust-analyzer"]
targets = [
    "wasm32-unknown-unknown",
    # Tauri Android shell (the tauri CLI expects all four ABIs to exist)
    "aarch64-linux-android",
    "armv7-linux-androideabi",
    "i686-linux-android",
    "x86_64-linux-android",
]
profile = "default"
