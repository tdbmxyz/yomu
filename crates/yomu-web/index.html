<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yomu</title>
    <meta name="theme-color" content="#14161c" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Scalable SVG favicon first (crisp at any tab/bookmark size), PNG
         fallback for browsers that don't take SVG icons; apple-touch-icon
         for iOS home-screen installs. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="favicon.svg" />
    <link data-trunk rel="copy-file" href="icon-192.png" />
    <link data-trunk rel="copy-file" href="icon-512.png" />
    <link data-trunk rel="copy-file" href="icon-maskable-512.png" />
    <!-- Register before the wasm bundle loads: the worker precaches the
         shell and its hashed assets at install, so offline works from the
         first session (registering from inside the app would be too late
         for the assets already fetched uncontrolled). -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </head>
  <body></body>
</html>
