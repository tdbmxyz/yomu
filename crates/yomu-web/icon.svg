<svg viewBox="-140 -140 880 880" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="yomu — open book logo">
  <!-- App-icon source: the same open-book mark as favicon.svg / logo.svg,
       centred in a padded viewBox so the whole book (blue fan + gold page
       edges + spine) stays inside an adaptive icon's safe zone instead of
       being cropped by the launcher's mask. The disc black matches the
       adaptive background, so the masked result still reads full-bleed. -->
  <defs>
    <radialGradient id="blueShell" cx="50%" cy="88%" r="78%">
      <stop offset="0%" stop-color="#cdd2e6"></stop>
      <stop offset="45%" stop-color="#a3abcc"></stop>
      <stop offset="100%" stop-color="#767fa8"></stop>
    </radialGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d3a4"></stop>
      <stop offset="52%" stop-color="#e6ac70"></stop>
      <stop offset="100%" stop-color="#c98c4f"></stop>
    </linearGradient>
  </defs>

  <circle cx="300" cy="300" r="291" fill="#080808"></circle>

  <path d="M 92 355
           A 232 232 0 0 1 508 355
           C 400 375, 322 430, 306 545
           L 294 545
           C 278 430, 200 375, 92 355 Z"
        fill="url(#blueShell)"></path>

  <path d="M 92 355 C 200 375, 278 430, 294 545"
        fill="none" stroke="url(#goldEdge)" stroke-width="20" stroke-linecap="round"></path>
  <path d="M 508 355 C 400 375, 322 430, 306 545"
        fill="none" stroke="url(#goldEdge)" stroke-width="20" stroke-linecap="round"></path>
</svg>
