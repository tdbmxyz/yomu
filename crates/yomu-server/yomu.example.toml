# Example yomu server configuration.
# Copy to yomu.toml (or point YOMU_CONFIG at it) and adjust.

listen = "0.0.0.0:4700"
# static_dir = "/var/lib/yomu/www"
db_path = "yomu.db"
data_dir = "data"          # downloaded chapters + cover cache
sources_dir = "sources.d"  # one *.toml per scan site

[updater]
enabled = true
interval_secs = 21600      # check every 6 hours (minimum 60)

# Built-in "local" source: series already on this machine, no site involved.
# Layout: <dir>/<Series>/<Chapter>/*.png  or  <dir>/<Series>/<Chapter>.cbz
# (optional per series: cover.jpg, details.json {"title", "description"})
[local]
enabled = true
dir = "local"

# OIDC sign-in (authentik or any standard provider). Without an issuer,
# yomu runs in single-account mode: no login, everyone shares the built-in
# "Everyone" account (and its reading positions). With it, each signed-in
# user gets their own reading progress; the library stays server-wide.
# Register <public_url>/api/v1/auth/callback as the redirect URI.
#[auth]
#issuer = "https://auth.example.com/application/o/yomu/"
#client_id = "yomu"
#client_secret = "…"
#public_url = "https://yomu.example.com"   # optional; derived from Host if unset
#session_days = 90

# Push notifications for new chapters found by the updater, sent to an
# ntfy topic (https://ntfy.sh or self-hosted). Subscribe to the topic in
# the ntfy app. Omit the section to disable.
#[notify]
#url = "https://ntfy.example.net/yomu"
#token = "tk_..."          # optional access token

# Sources-tab catalog cache: cached listing pages are served instantly
# and refreshed in the background once older than ttl_secs (0 = always
# fetch live).
#[catalog]
#ttl_secs = 21600
